<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Watching</title>
    <link rel="stylesheet" href="global.css">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <!-- Mapbox GL JS CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="map.js" type="module"></script>
    <title>Bike Watching</title>
</head>

<body>
    <div class="container">
        <div></div> <!-- Spacer for layout -->
        <header>
            <h1>🚴🏼‍♀️ Boston Bike Watching</h1>
            <p>Visualization depicting 2014 Bluebikes data of bike station activity in Boston.</p>
        </header>

        <label>
            <input type=range min="-1" max="1440" value="-1" id="time-slider">
            <em id="any-time">(Any Time)</em>
            <time id="selected-time"></time>
        </label>
    </div>

    <div id="map">
        <svg></svg>
    </div>

    <div class="container">
        <div></div> <!-- Spacer for layout -->
        <h3>Hover over each station for details!</h3>
        <div class="bike-lane-legend">
            <div class="bike-lane-swatch"></div>
            <span>Bike Lanes</span>
        </div>
    </div>

    <div class="legend">
        <div style="--departure-ratio: 1; justify-content: left;">MORE DEPARTURES</div>
        <div style="--departure-ratio: 0.5; justify-content: center;">BALANCED</div>
        <div style="--departure-ratio: 0; justify-content: right;">MORE ARRIVALS</div>
    </div>
</body>

</html>
